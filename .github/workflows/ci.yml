name: CI

on:
  push:
    branches: [main, dev, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build R${{ matrix.revit-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        revit-version: [2026, 2025]

    steps:
      - uses: actions/checkout@v4
        with:
          # Phase 1+: fetch the RevitMCP.Core submodule
          submodules: recursive

      - name: Submodule drift guard (RevitMCPCore)
        # Fails when the pinned commit is no longer on upstream main (e.g. upstream
        # rebased, as happened after v0.8.18 — pin f88f451 became orphaned).
        shell: pwsh
        run: |
          git -C extern/RevitMCPCore fetch --quiet origin main
          git -C extern/RevitMCPCore merge-base --is-ancestor HEAD origin/main
          if ($LASTEXITCODE -ne 0) {
            $pin = git -C extern/RevitMCPCore rev-parse --short HEAD
            Write-Error ("extern/RevitMCPCore pin $pin is NOT on upstream main (rebase upstream?). " +
              "Re-sync: cd extern/RevitMCPCore; git fetch origin --tags; git checkout <latest release tag>; " +
              "cd ../..; git add extern/RevitMCPCore; commit the bump.")
            exit 1
          }

      - name: Setup .NET 8 + 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore -p:RevitVersion=${{ matrix.revit-version }}

      - name: Build
        run: >
          dotnet build RevitAssistant.slnx
          --no-restore
          -p:RevitVersion=${{ matrix.revit-version }}
          -p:DeployToRevit=false
          -c Release

      - name: Test
        run: >
          dotnet test RevitAssistant.slnx
          --no-build
          -p:RevitVersion=${{ matrix.revit-version }}
          -c Release
          --logger "trx;LogFileName=results-r${{ matrix.revit-version }}.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-r${{ matrix.revit-version }}
          path: "**/*.trx"
